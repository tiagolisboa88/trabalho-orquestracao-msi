leitura_tecnica:
  description: >
    Analise o documento PDF de escopo técnico fornecido pelo cliente
    para o projeto: {projeto}.

    O conteúdo do PDF de escopo é:
    {escopo_pdf}

    Extraia as seguintes informações:
    1. Classificação dos serviços (montagem, reforma, desmontagem, fabricação, etc.)
    2. Quantitativos de materiais (tubulação em metros, estruturas em toneladas, etc.)
    3. Requisitos técnicos especiais (soldas especiais, tratamentos térmicos, etc.)
    4. Condições de campo (altura, espaço confinado, área classificada)
    5. Prazo solicitado pelo cliente
  expected_output: >
    Relatório estruturado contendo:
    - Lista de serviços classificados por disciplina
    - Quantitativos detalhados com unidades de medida
    - Requisitos técnicos e normas aplicáveis
    - Condições especiais de campo identificadas
    - Prazo do cliente e observações relevantes
  agent: leitor_tecnico

composicao_hh:
  description: >
    Com base no escopo e quantitativos extraídos pelo Leitor Técnico,
    defina a composição de Homem-Hora (HH) para cada serviço.

    Para cada serviço, determine:
    1. Índice de produtividade (HH/unidade) baseado em dados históricos
    2. Composição da equipe (quantidade e qualificação dos profissionais)
    3. Duração estimada de cada atividade
    4. Fatores de ajuste (complexidade, condições de campo, turno)

    Utilize a BASE HISTÓRICA DE OBRAS da MSI Engenharia abaixo como referência
    para calibrar índices de produtividade e dimensionar equipes:

    BASE HISTÓRICA DE OBRAS MSI ENGENHARIA:
    | Obra | Tipo | Disciplina | Qtd | Unid | HH Total | HH/Unid | Equipe | Dias | Custo (R$) | Ano |
    | Mineradora Vale | Montagem | Estrutura Metálica | 150 | ton | 4500 | 30 | 8 montadores + 2 soldadores | 45 | 850.000 | 2024 |
    | Mineradora Vale | Montagem | Tubulação | 2000 | m | 6000 | 3 | 6 tubuladores + 4 soldadores | 60 | 1.200.000 | 2024 |
    | Usina Beneficiamento | Reforma | Caldeiraria | 80 | ton | 3200 | 40 | 6 caldeireiros + 3 soldadores | 40 | 640.000 | 2024 |
    | Usina Beneficiamento | Montagem | Estrutura Metálica | 200 | ton | 5000 | 25 | 10 montadores + 3 soldadores | 50 | 950.000 | 2024 |
    | Planta Pelotização | Montagem | Equipamentos | 15 | un | 2250 | 150 | 5 mecânicos + 2 riggers | 30 | 450.000 | 2025 |
    | Planta Pelotização | Montagem | Tubulação | 3500 | m | 8750 | 2.5 | 8 tubuladores + 5 soldadores | 70 | 1.750.000 | 2025 |
    | Siderúrgica CSN | Desmontagem | Estrutura Metálica | 100 | ton | 2000 | 20 | 6 montadores + 1 rigger | 25 | 400.000 | 2025 |
    | Siderúrgica CSN | Montagem | Estrutura Metálica | 180 | ton | 4680 | 26 | 9 montadores + 3 soldadores | 52 | 890.000 | 2025 |
    | Mineradora Anglo | Fabricação | Caldeiraria | 50 | ton | 2500 | 50 | 5 caldeireiros + 3 soldadores | 35 | 625.000 | 2025 |
    | Mineradora Anglo | Montagem | Equipamentos | 8 | un | 1600 | 200 | 4 mecânicos + 2 riggers | 20 | 320.000 | 2025 |
    | Planta Filtragem | Montagem | Tubulação | 1500 | m | 4500 | 3 | 6 tubuladores + 3 soldadores | 38 | 900.000 | 2025 |
    | Planta Filtragem | Montagem | Estrutura Metálica | 120 | ton | 3360 | 28 | 7 montadores + 2 soldadores | 35 | 640.000 | 2025 |
    | Mineradora Samarco | Reforma | Equipamentos | 12 | un | 2400 | 200 | 4 mecânicos + 3 soldadores | 30 | 480.000 | 2026 |
    | Mineradora Samarco | Montagem | Estrutura Metálica | 250 | ton | 6250 | 25 | 12 montadores + 4 soldadores | 55 | 1.187.500 | 2026 |
    | Britagem Primária | Montagem | Caldeiraria | 90 | ton | 3600 | 40 | 7 caldeireiros + 3 soldadores | 38 | 720.000 | 2026 |
  expected_output: >
    Planilha de composição contendo:
    - Serviço x HH estimado x Equipe x Produtividade
    - Justificativa dos índices adotados
    - Fatores de ajuste aplicados
    - Total de HH por disciplina e geral
    - Cronograma preliminar de execução
  agent: compositor

consolidacao_orcamento:
  description: >
    Consolide o orçamento completo do projeto utilizando os quantitativos
    e composições de HH definidos nas etapas anteriores.

    Utilize a TABELA DE CUSTOS REFERENCIAIS da MSI Engenharia abaixo:

    TABELA DE CUSTOS REFERENCIAIS MSI ENGENHARIA:
    MÃO DE OBRA:
    - Montador Industrial: R$ 85/HH (CCT Sindimetal 2026)
    - Soldador Qualificado: R$ 110/HH (CCT Sindimetal 2026)
    - Caldeireiro: R$ 95/HH (CCT Sindimetal 2026)
    - Tubulador: R$ 90/HH (CCT Sindimetal 2026)
    - Rigger: R$ 100/HH (CCT Sindimetal 2026)
    - Mecânico Industrial: R$ 105/HH (CCT Sindimetal 2026)
    - Encarregado: R$ 130/HH (CCT Sindimetal 2026)
    - Supervisor: R$ 180/HH (MSI Engenharia)

    MATERIAIS:
    - Aço Estrutural A572 Gr50: R$ 8,50/kg (Cotação Gerdau Jun/2026)
    - Tubo Aço Carbono Sch40: R$ 320/m (Cotação Vallourec Jun/2026)
    - Eletrodo E7018: R$ 35/kg (Cotação ESAB Jun/2026)
    - Chapa Aço Carbono 1/2": R$ 7,80/kg (Cotação Usiminas Jun/2026)

    EQUIPAMENTOS:
    - Guindaste 50t (com operador): R$ 4.500/diária (Cotação Locar Mai/2026)
    - Munck 15t: R$ 1.800/diária (Cotação Locar Mai/2026)
    - Plataforma Elevatória: R$ 950/diária (Cotação Mills Mai/2026)
    - Máquina de Solda MIG/MAG: R$ 180/diária (MSI Engenharia)

    CUSTOS INDIRETOS:
    - Mobilização (até 500km): R$ 45.000 verba (MSI Engenharia)
    - Alimentação: R$ 65/pessoa/dia (Contrato Sodexo)
    - Transporte (van): R$ 8.500/mês (Cotação Local)
    - Alojamento: R$ 80/pessoa/dia (Cotação Local)
    - EPI (kit completo): R$ 850/un (MSI Engenharia)
    - Ferramental (kit equipe): R$ 3.500/mês (MSI Engenharia)
    - Administração de Obra: 8% (MSI Engenharia)
    - BDI Padrão MSI: 22%

    Inclua:
    1. Custos diretos: mão de obra (usando tabela acima), materiais e equipamentos
    2. Custos indiretos: mobilização/desmobilização, alimentação, transporte,
       alojamento, EPIs, ferramentas, administração de obra (usando tabela acima)
    3. BDI (Bonificação e Despesas Indiretas) - referência: 22% MSI
    4. Margem de lucro e contingência
    5. Cronograma físico-financeiro com condições de pagamento
    6. Validade da proposta e premissas adotadas

    KPIs a reportar:
    - Custo por HH médio (R$/HH)
    - Percentual de custos indiretos sobre diretos
    - BDI aplicado vs. faixa de mercado (15-30%)
    - Margem líquida estimada
  expected_output: >
    Proposta comercial completa contendo:
    - Resumo executivo do escopo
    - Planilha de custos detalhada (diretos + indiretos)
    - Composição do BDI
    - Preço global e unitários
    - Cronograma físico-financeiro
    - Premissas e exclusões
    - Condições comerciais (pagamento, reajuste, validade)
    - Dashboard de KPIs do orçamento
  agent: orcamentista

revisao_proposta:
  description: >
    Revise a proposta final sob os aspectos jurídicos, técnicos e de preços.
    Use os dados de referência abaixo para validar os valores da proposta.

    REFERÊNCIAS DE PREÇOS MSI ENGENHARIA (CCT Sindimetal 2026 e cotações Jun/2026):
    MÃO DE OBRA: Montador R$85/HH | Soldador R$110/HH | Caldeireiro R$95/HH | Tubulador R$90/HH | Rigger R$100/HH | Mecânico R$105/HH | Encarregado R$130/HH | Supervisor R$180/HH
    MATERIAIS: Aço A572 R$8,50/kg | Tubo Sch40 R$320/m | Eletrodo E7018 R$35/kg | Chapa 1/2" R$7,80/kg
    EQUIPAMENTOS: Guindaste 50t R$4.500/dia | Munck 15t R$1.800/dia | Plataforma R$950/dia | Solda MIG R$180/dia
    INDIRETOS: Mobilização R$45.000 | Alimentação R$65/pessoa/dia | Transporte R$8.500/mês | Alojamento R$80/pessoa/dia | EPI R$850/un | Ferramental R$3.500/mês | Adm Obra 8% | BDI Padrão 22%

    HISTÓRICO DE CUSTOS POR DISCIPLINA (referência):
    Estrutura Metálica: 25-30 HH/ton, R$4.750-5.700/ton | Tubulação: 2,5-3 HH/m, R$500-600/m | Caldeiraria: 40-50 HH/ton, R$7.100-8.000/ton | Equipamentos: 150-200 HH/un, R$30.000-40.000/un

    Aspectos Jurídicos:
    1. Cláusulas de responsabilidade e garantia
    2. Condições de reajuste e multas
    3. Seguros obrigatórios (RC, risco de engenharia)
    4. Conformidade com legislação trabalhista

    Aspectos Técnicos:
    1. Conformidade com normas regulamentadoras (NR-13, NR-18, NR-35, etc.)
    2. Requisitos de segurança do trabalho
    3. Viabilidade do cronograma proposto
    4. Riscos técnicos identificados

    Validação de Preços (compare com as referências acima):
    1. Custos de mão de obra vs. pisos salariais CCT Sindimetal 2026
    2. Preços de materiais vs. cotações de mercado Jun/2026
    3. BDI vs. faixas praticadas no mercado de montagem industrial (15-30%)
    4. Preço global vs. orçamentos históricos de projetos similares
    5. Sinalize valores fora da faixa aceitável (±15%) com risco (baixo/médio/alto)

    KPIs finais a consolidar:
    - Tempo total de elaboração do orçamento
    - Número de revisões necessárias
    - Score de risco geral da proposta (1-10)
    - Score de competitividade (1-10)
    - Taxa de aderência ao mercado
  expected_output: >
    Parecer de revisão contendo:
    - Análise jurídica com riscos e recomendações
    - Análise técnica com conformidade normativa
    - Validação de preços com comparativo de mercado
    - Lista de riscos identificados com mitigações
    - Recomendações de ajuste na proposta
    - Parecer final (aprovado / aprovado com ressalvas / reprovado)
    - Dashboard consolidado de KPIs do orçamento
  agent: revisor_proposta
